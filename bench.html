<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nulltracer — Integrator Benchmark</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0a0806;min-height:100vh;
  font-family:'IBM Plex Mono',monospace;color:#c8bfa9;
}

/* Header */
.header{
  padding:24px 32px 16px;
  border-bottom:1px solid rgba(200,180,140,.06);
  display:flex;align-items:baseline;gap:20px;flex-wrap:wrap;
}
.header h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-size:24px;
  letter-spacing:.08em;color:#e8dfd0;
  text-shadow:0 0 40px rgba(255,180,100,.15);
}
.header .sub{
  font-size:10px;font-weight:300;letter-spacing:.25em;
  text-transform:uppercase;color:#7a7060;
}
.header .back-link{
  margin-left:auto;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:#8a7e6c;text-decoration:none;
  border:1px solid rgba(200,180,140,.1);border-radius:5px;
  padding:4px 10px;transition:all .25s;
}
.header .back-link:hover{color:#d4c8b0;border-color:rgba(200,180,140,.25);}

/* Controls Panel */
.controls-panel{
  padding:20px 32px;
  border-bottom:1px solid rgba(200,180,140,.06);
  display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;
}
.ctrl-group{display:flex;flex-direction:column;gap:4px;}
.ctrl-label{
  font-size:9px;font-weight:500;letter-spacing:.22em;
  text-transform:uppercase;color:#a09080;
}
.ctrl-input{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:#d4c8b0;background:rgba(200,180,140,.06);
  border:1px solid rgba(200,180,140,.12);border-radius:5px;
  padding:5px 10px;outline:none;width:100px;
}
.ctrl-input:focus{border-color:rgba(200,180,140,.3);}
.ctrl-input.wide{width:160px;}
select.ctrl-input{-webkit-appearance:none;appearance:none;cursor:pointer;}
select.ctrl-input option{background:#1a1510;color:#c8bfa9;}

.ctrl-check{display:flex;align-items:center;gap:6px;cursor:pointer;}
.ctrl-check input{accent-color:#c8b890;}
.ctrl-check span{font-size:10px;color:#9a8e7c;letter-spacing:.1em;text-transform:uppercase;}

.btn-run{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;
  color:#0a0806;background:linear-gradient(135deg,#c8b890,#a09070);
  border:none;border-radius:6px;padding:8px 24px;cursor:pointer;
  transition:all .3s;min-width:140px;
}
.btn-run:hover{background:linear-gradient(135deg,#d4c8a0,#b0a080);transform:translateY(-1px);}
.btn-run:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-run.running{
  background:linear-gradient(135deg,#a08060,#806040);
  animation:pulse-btn 1.5s ease-in-out infinite;
}
@keyframes pulse-btn{0%,100%{opacity:.6}50%{opacity:1}}

/* Status Bar */
.status-bar{
  padding:10px 32px;font-size:10px;color:#6a6050;
  letter-spacing:.1em;min-height:32px;
  border-bottom:1px solid rgba(200,180,140,.04);
}
.status-bar .highlight{color:#c8b890;}

/* Summary Panel */
.summary-panel{
  padding:16px 32px;
  border-bottom:1px solid rgba(200,180,140,.06);
  display:none;
}
.summary-panel.visible{display:block;}
.summary-grid{
  display:flex;flex-wrap:wrap;gap:20px;
}
.summary-card{
  background:rgba(200,180,140,.04);
  border:1px solid rgba(200,180,140,.08);
  border-radius:8px;padding:12px 16px;min-width:160px;
}
.summary-card .label{
  font-size:8px;font-weight:500;letter-spacing:.22em;
  text-transform:uppercase;color:#8a7e6c;margin-bottom:4px;
}
.summary-card .value{
  font-size:18px;font-weight:300;color:#e8dfd0;
  font-variant-numeric:tabular-nums;
}
.summary-card .value .unit{font-size:11px;color:#8a7e6c;margin-left:2px;}
.summary-card.fastest{border-color:rgba(100,200,140,.2);background:rgba(100,200,140,.04);}
.summary-card.fastest .value{color:#8fd4a8;}
.summary-card.slowest{border-color:rgba(200,100,80,.15);background:rgba(200,100,80,.03);}
.summary-card.slowest .value{color:#d4a088;}

/* Results Grid */
.results-container{
  padding:20px 32px 40px;
}
.results-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(420px, 1fr));
  gap:20px;
}
.result-card{
  background:rgba(10,8,6,.6);
  border:1px solid rgba(200,180,140,.08);
  border-radius:10px;overflow:hidden;
  transition:border-color .3s;
}
.result-card:hover{border-color:rgba(200,180,140,.18);}
.result-card.fastest{border-color:rgba(100,200,140,.25);}
.result-card.slowest{border-color:rgba(200,100,80,.2);}
.result-card.error{border-color:rgba(200,60,40,.3);opacity:.7;}

.result-header{
  padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(200,180,140,.06);
}
.result-method{
  font-size:13px;font-weight:500;color:#e8dfd0;letter-spacing:.08em;
}
.result-badge{
  font-size:8px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;
  padding:2px 8px;border-radius:3px;
}
.result-badge.ok{color:#8fd4a8;background:rgba(100,200,140,.1);border:1px solid rgba(100,200,140,.15);}
.result-badge.err{color:#d48080;background:rgba(200,80,80,.1);border:1px solid rgba(200,80,80,.15);}
.result-badge.fastest-badge{color:#8fd4a8;background:rgba(100,200,140,.15);border:1px solid rgba(100,200,140,.25);}
.result-badge.slowest-badge{color:#d4a088;background:rgba(200,100,80,.1);border:1px solid rgba(200,100,80,.15);}

.result-image{
  width:100%;aspect-ratio:16/9;background:#050403;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:pointer;position:relative;
}
.result-image img{width:100%;height:100%;object-fit:contain;}
.result-image .placeholder{font-size:10px;color:#4a4030;letter-spacing:.15em;text-transform:uppercase;}
.result-image .zoom-hint{
  position:absolute;bottom:6px;right:8px;
  font-size:8px;color:rgba(200,180,140,.3);letter-spacing:.1em;
  text-transform:uppercase;opacity:0;transition:opacity .3s;
}
.result-image:hover .zoom-hint{opacity:1;}

.result-stats{
  padding:10px 16px;
  display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;
}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;}
.stat-label{font-size:9px;color:#7a7060;letter-spacing:.1em;text-transform:uppercase;}
.stat-value{font-size:11px;color:#d4c8b0;font-variant-numeric:tabular-nums;}
.stat-value.highlight{color:#e8dfd0;font-weight:500;}

.result-bar{
  padding:0 16px 12px;
}
.bar-track{
  height:4px;background:rgba(200,180,140,.06);border-radius:2px;overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,#8fd4a8,#c8b890);
  transition:width .6s ease;
}
.result-card.slowest .bar-fill{background:linear-gradient(90deg,#d4a088,#c09060);}

/* Progress / Placeholder Card */
.result-card.rendering{
  border-color:rgba(200,180,140,.2);
  animation:card-pulse 2s ease-in-out infinite;
}
@keyframes card-pulse{0%,100%{border-color:rgba(200,180,140,.1)}50%{border-color:rgba(200,180,140,.3)}}
.result-card.rendering .result-image{
  display:flex;align-items:center;justify-content:center;
  min-height:120px;
}
.render-spinner{
  width:24px;height:24px;border-radius:50%;
  border:2px solid rgba(200,180,140,.1);
  border-top-color:rgba(200,180,140,.5);
  animation:spin 1s linear infinite;
  margin-right:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.render-progress-text{
  font-size:10px;color:#8a7e6c;letter-spacing:.12em;text-transform:uppercase;
}

.result-card{
  opacity:0;transform:translateY(12px);
  animation:card-appear .4s ease forwards;
}
@keyframes card-appear{to{opacity:1;transform:translateY(0)}}

/* Lightbox */
.lightbox{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.92);
  display:none;align-items:center;justify-content:center;
  cursor:zoom-out;
}
.lightbox.visible{display:flex;}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:4px;}
.lightbox-label{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  font-size:12px;color:#c8bfa9;letter-spacing:.15em;text-transform:uppercase;
  background:rgba(10,8,6,.8);padding:6px 16px;border-radius:6px;
  border:1px solid rgba(200,180,140,.1);
}

/* Responsive */
@media(max-width:720px){
  .header{padding:16px 16px 12px;}
  .controls-panel{padding:12px 16px;}
  .results-container{padding:12px 16px 32px;}
  .results-grid{grid-template-columns:1fr;}
  .summary-panel{padding:12px 16px;}
  .status-bar{padding:8px 16px;}
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <h1>Integrator Benchmark</h1>
    <div class="sub">Side-by-side comparison of all integration methods at 1920×1080</div>
  </div>
  <a href="/" class="back-link">← Back to Renderer</a>
</div>

<!-- Controls -->
<div class="controls-panel">
  <div class="ctrl-group">
    <div class="ctrl-label">Spin (a)</div>
    <input type="number" class="ctrl-input" id="ctrl-spin" value="0.6" min="0" max="0.998" step="0.002">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Charge (Q)</div>
    <input type="number" class="ctrl-input" id="ctrl-charge" value="0.0" min="0" max="0.998" step="0.002">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Inclination (°)</div>
    <input type="number" class="ctrl-input" id="ctrl-incl" value="80.0" min="3" max="89" step="0.5">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">FOV</div>
    <input type="number" class="ctrl-input" id="ctrl-fov" value="8.0" min="2" max="25" step="0.5">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Steps</div>
    <input type="number" class="ctrl-input" id="ctrl-steps" value="200" min="60" max="500" step="10">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Step Size</div>
    <input type="number" class="ctrl-input" id="ctrl-stepsize" value="0.30" min="0.10" max="0.80" step="0.02">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Observer Dist</div>
    <input type="number" class="ctrl-input" id="ctrl-obsdist" value="40" min="20" max="100" step="5">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Background</div>
    <select class="ctrl-input" id="ctrl-bg">
      <option value="0">Stars</option>
      <option value="1" selected>Checker</option>
      <option value="2">Color Map</option>
    </select>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Disk Temp</div>
    <input type="number" class="ctrl-input" id="ctrl-disktemp" value="1.0" min="0.2" max="2.5" step="0.05">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Doppler</div>
    <select class="ctrl-input" id="ctrl-doppler">
      <option value="0">Off</option>
      <option value="1">g³ thin</option>
      <option value="2" selected>g⁴ thick</option>
    </select>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Image Format</div>
    <select class="ctrl-input" id="ctrl-format">
      <option value="webp" selected>WebP</option>
      <option value="jpeg">JPEG</option>
      <option value="png">PNG</option>
    </select>
  </div>
  <div class="ctrl-group" style="align-self:center;">
    <label class="ctrl-check">
      <input type="checkbox" id="ctrl-disk" checked>
      <span>Disk</span>
    </label>
    <label class="ctrl-check">
      <input type="checkbox" id="ctrl-grid" checked>
      <span>Grid</span>
    </label>
  </div>
  <div class="ctrl-group" style="align-self:flex-end;">
    <button class="btn-run" id="btn-run">Run Benchmark</button>
  </div>
</div>

<!-- Status -->
<div class="status-bar" id="status-bar">
  Ready — configure parameters and click <span class="highlight">Run Benchmark</span>
</div>

<!-- Summary -->
<div class="summary-panel" id="summary-panel">
  <div class="summary-grid" id="summary-grid"></div>
</div>

<!-- Results -->
<div class="results-container">
  <div class="results-grid" id="results-grid"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-label" id="lightbox-label"></div>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// BENCH UI — SSE streaming client for /bench endpoint
// Results appear incrementally as each integrator completes.

const $ = id => document.getElementById(id);

const btnRun = $('btn-run');
const statusBar = $('status-bar');
const summaryPanel = $('summary-panel');
const summaryGrid = $('summary-grid');
const resultsGrid = $('results-grid');
const lightbox = $('lightbox');
const lightboxImg = $('lightbox-img');
const lightboxLabel = $('lightbox-label');

// Method display names and descriptions
const METHOD_INFO = {
  rk4:          { name: 'RK4',             desc: 'Classical Runge-Kutta 4th-order',    type: 'Non-symplectic' },
  rkdp8:        { name: 'RKDP8',           desc: 'Dormand-Prince adaptive 8th-order',  type: 'Adaptive' },
  tao_yoshida4: { name: 'Tao-Yoshida 4',   desc: 'Tao extended phase space + Yoshida 4th-order', type: 'Tao symplectic' },
  tao_yoshida6: { name: 'Tao-Yoshida 6',   desc: 'Tao extended phase space + Yoshida 6th-order', type: 'Tao symplectic' },
  tao_kahan_li8:{ name: 'Tao-Kahan-Li 8',  desc: 'Tao extended phase space + Kahan-Li 8th-order', type: 'Tao symplectic' },
  kahanli8s:    { name: 'Kahan-Li 8s',     desc: 'Kahan-Li 8th-order (BL coords)',     type: 'Symplectic' },
  kahanli8s_ks: { name: 'Kahan-Li 8s KS',  desc: 'Kahan-Li 8th-order (Kerr-Schild)',   type: 'Symplectic' },
};

// Lightbox
lightbox.addEventListener('click', () => lightbox.classList.remove('visible'));
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') lightbox.classList.remove('visible');
});

function openLightbox(src, label) {
  lightboxImg.src = src;
  lightboxLabel.textContent = label;
  lightbox.classList.add('visible');
}

// Status helpers
function setStatus(html) {
  statusBar.innerHTML = html;
}

// Build request payload
function buildRequest() {
  return {
    spin:           parseFloat($('ctrl-spin').value),
    charge:         parseFloat($('ctrl-charge').value),
    inclination:    parseFloat($('ctrl-incl').value),
    fov:            parseFloat($('ctrl-fov').value),
    steps:          parseInt($('ctrl-steps').value),
    step_size:      parseFloat($('ctrl-stepsize').value),
    obs_dist:       parseInt($('ctrl-obsdist').value),
    bg_mode:        parseInt($('ctrl-bg').value),
    show_disk:      $('ctrl-disk').checked,
    show_grid:      $('ctrl-grid').checked,
    disk_temp:      parseFloat($('ctrl-disktemp').value),
    doppler_boost:  parseInt($('ctrl-doppler').value),
    format:         $('ctrl-format').value,
    quality:        90,
    star_layers:    3,
    phi0:           0.0,
    include_images: true,
  };
}

// Format helpers
function fmtMs(ms) {
  if (ms == null) return '—';
  return ms < 1000 ? `${ms.toFixed(1)} ms` : `${(ms / 1000).toFixed(2)} s`;
}

function fmtBytes(b) {
  if (b == null) return '—';
  if (b < 1024) return `${b} B`;
  if (b < 1024 * 1024) return `${(b / 1024).toFixed(1)} KB`;
  return `${(b / (1024 * 1024)).toFixed(2)} MB`;
}

// Create a "rendering..." placeholder card
function createPlaceholderCard(method) {
  const info = METHOD_INFO[method] || { name: method, desc: '', type: '' };
  const card = document.createElement('div');
  card.className = 'result-card rendering';
  card.id = `card-${method}`;
  card.innerHTML = `
    <div class="result-header">
      <div>
        <div class="result-method">${info.name}</div>
        <div style="font-size:9px;color:#6a6050;margin-top:2px;">${info.desc} — ${info.type}</div>
      </div>
      <span class="result-badge ok" style="opacity:.4">Rendering…</span>
    </div>
    <div class="result-image">
      <div style="display:flex;align-items:center;">
        <div class="render-spinner"></div>
        <span class="render-progress-text">Rendering at 1920×1080…</span>
      </div>
    </div>
  `;
  return card;
}

// Create a completed result card
function createResultCard(r) {
  const info = METHOD_INFO[r.method] || { name: r.method, desc: '', type: '' };
  const isError = r.status !== 'ok';

  const card = document.createElement('div');
  card.className = 'result-card' + (isError ? ' error' : '');
  card.id = `card-${r.method}`;

  // Badge (will be updated later when summary arrives)
  let badge = isError
    ? '<span class="result-badge err">Error</span>'
    : '<span class="result-badge ok">OK</span>';

  // Image section
  let imageHtml;
  if (r.image_base64) {
    imageHtml = `
      <div class="result-image" data-src="${r.image_base64}" data-label="${info.name}">
        <img src="${r.image_base64}" alt="${info.name} render" loading="lazy">
        <span class="zoom-hint">Click to enlarge</span>
      </div>`;
  } else {
    imageHtml = `
      <div class="result-image">
        <span class="placeholder">${isError ? r.error || 'Render failed' : 'No image'}</span>
      </div>`;
  }

  // Stats
  let statsHtml;
  if (isError) {
    statsHtml = `
      <div class="result-stats" style="grid-template-columns:1fr;">
        <div class="stat-row"><span class="stat-label">Error</span></div>
        <div class="stat-row"><span class="stat-value" style="color:#d48080;font-size:10px;">${r.error || 'Unknown error'}</span></div>
      </div>`;
  } else {
    statsHtml = `
      <div class="result-stats">
        <div class="stat-row">
          <span class="stat-label">Kernel</span>
          <span class="stat-value highlight">${fmtMs(r.kernel_ms)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Render</span>
          <span class="stat-value">${fmtMs(r.render_ms)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Encode</span>
          <span class="stat-value">${fmtMs(r.encode_ms)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Total</span>
          <span class="stat-value">${fmtMs(r.total_ms)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">GPU Alloc</span>
          <span class="stat-value">${fmtBytes(r.gpu_mem_alloc_bytes)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Image Size</span>
          <span class="stat-value">${fmtBytes(r.image_size_bytes)}</span>
        </div>
      </div>`;
  }

  card.innerHTML = `
    <div class="result-header">
      <div>
        <div class="result-method">${info.name}</div>
        <div style="font-size:9px;color:#6a6050;margin-top:2px;">${info.desc} — ${info.type}</div>
      </div>
      ${badge}
    </div>
    ${imageHtml}
    ${statsHtml}
    <div class="result-bar">
      <div class="bar-track">
        <div class="bar-fill" data-method="${r.method}" style="width:2%"></div>
      </div>
    </div>
  `;

  // Attach lightbox handler
  const imgEl = card.querySelector('.result-image[data-src]');
  if (imgEl) {
    imgEl.addEventListener('click', () => openLightbox(imgEl.dataset.src, imgEl.dataset.label));
  }

  return card;
}

// ── Update badges and bars after summary arrives ────
function applyFinalStyling(results, summary) {
  if (!summary || !summary.fastest_method) return;

  const maxKernel = summary.slowest_kernel_ms || 1;

  for (const r of results) {
    const card = document.getElementById(`card-${r.method}`);
    if (!card || r.status !== 'ok') continue;

    const isFastest = r.method === summary.fastest_method;
    const isSlowest = r.method === summary.slowest_method;

    // Update card class
    if (isFastest) card.classList.add('fastest');
    if (isSlowest && results.length > 1) card.classList.add('slowest');

    // Update badge
    const badgeEl = card.querySelector('.result-badge');
    if (badgeEl) {
      if (isFastest) {
        badgeEl.className = 'result-badge fastest-badge';
        badgeEl.textContent = '⚡ Fastest';
      } else if (isSlowest && results.length > 1) {
        badgeEl.className = 'result-badge slowest-badge';
        badgeEl.textContent = 'Slowest';
      }
    }

    // Update bar width
    const barFill = card.querySelector('.bar-fill');
    if (barFill && r.kernel_ms != null) {
      const pct = Math.max(2, (r.kernel_ms / maxKernel) * 100);
      barFill.style.width = `${pct.toFixed(1)}%`;
    }
  }
}

// ── Render summary cards ────────────────────────────
function renderSummary(summary, totalBenchMs, gpu) {
  summaryGrid.innerHTML = '';
  if (!summary || !summary.fastest_method) return;

  const cards = [
    { label: 'Fastest Integrator', value: METHOD_INFO[summary.fastest_method]?.name || summary.fastest_method, unit: '', cls: 'fastest' },
    { label: 'Fastest Kernel Time', value: summary.fastest_kernel_ms?.toFixed(1), unit: 'ms', cls: 'fastest' },
    { label: 'Slowest Integrator', value: METHOD_INFO[summary.slowest_method]?.name || summary.slowest_method, unit: '', cls: 'slowest' },
    { label: 'Slowest Kernel Time', value: summary.slowest_kernel_ms?.toFixed(1), unit: 'ms', cls: 'slowest' },
    { label: 'Speedup Ratio', value: summary.speedup_ratio?.toFixed(2), unit: '×', cls: '' },
    { label: 'Total Bench Time', value: totalBenchMs?.toFixed(0), unit: 'ms', cls: '' },
    { label: 'GPU', value: gpu?.split('(')[0]?.trim() || '—', unit: '', cls: '' },
    { label: 'Methods Tested', value: `${summary.methods_ok}/${summary.methods_ok + summary.methods_failed}`, unit: 'ok', cls: '' },
  ];

  for (const c of cards) {
    const el = document.createElement('div');
    el.className = `summary-card ${c.cls}`;
    el.innerHTML = `
      <div class="label">${c.label}</div>
      <div class="value">${c.value}<span class="unit">${c.unit}</span></div>
    `;
    summaryGrid.appendChild(el);
  }

  summaryPanel.classList.add('visible');
}

// ── SSE stream parser ───────────────────────────────
// Parses SSE events from a ReadableStream (for POST requests,
// since EventSource only supports GET).
async function* parseSSE(reader) {
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });

    // Split on double newlines (SSE event boundary)
    const parts = buffer.split('\n\n');
    buffer = parts.pop(); // Keep incomplete last part in buffer

    for (const part of parts) {
      if (!part.trim()) continue;

      let event = 'message';
      let data = '';

      for (const line of part.split('\n')) {
        if (line.startsWith('event: ')) {
          event = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          data = line.slice(6);
        }
      }

      if (data) {
        try {
          yield { event, data: JSON.parse(data) };
        } catch (e) {
          console.warn('Failed to parse SSE data:', data, e);
        }
      }
    }
  }

  // Process any remaining buffer
  if (buffer.trim()) {
    let event = 'message';
    let data = '';
    for (const line of buffer.split('\n')) {
      if (line.startsWith('event: ')) event = line.slice(7).trim();
      else if (line.startsWith('data: ')) data = line.slice(6);
    }
    if (data) {
      try { yield { event, data: JSON.parse(data) }; } catch (e) {}
    }
  }
}

// ── Run benchmark (SSE streaming) ───────────────────
let abortController = null;

async function runBenchmark() {
  if (abortController) {
    abortController.abort();
    abortController = null;
    btnRun.textContent = 'Run Benchmark';
    btnRun.classList.remove('running');
    setStatus('Benchmark cancelled.');
    return;
  }

  const payload = buildRequest();

  // Validate spin² + charge² ≤ 1
  if (payload.spin ** 2 + payload.charge ** 2 > 1.0) {
    setStatus('<span style="color:#d48080;">Error: spin² + charge² must be ≤ 1</span>');
    return;
  }

  btnRun.textContent = 'Cancel';
  btnRun.classList.add('running');
  summaryPanel.classList.remove('visible');
  resultsGrid.innerHTML = '';

  setStatus('Connecting to benchmark server…');

  abortController = new AbortController();
  const t0 = performance.now();

  // Track state across SSE events
  let benchGpu = '';
  let benchResolution = {};
  let allResults = [];
  let totalMethods = 0;
  let completedMethods = 0;
  let currentPlaceholder = null;

  try {
    const resp = await fetch('/bench', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: abortController.signal,
    });

    if (!resp.ok) {
      // Try to parse error body
      const text = await resp.text();
      let detail;
      try { detail = JSON.parse(text).detail; } catch { detail = text || resp.statusText; }
      throw new Error(detail || `HTTP ${resp.status}`);
    }

    const reader = resp.body.getReader();

    for await (const { event, data } of parseSSE(reader)) {
      switch (event) {
        case 'started':
          benchGpu = data.gpu || '';
          benchResolution = data.resolution || {};
          totalMethods = data.total || 0;
          setStatus(
            `Benchmark started — <span class="highlight">${totalMethods}</span> integrators at ` +
            `<span class="highlight">${benchResolution.width}×${benchResolution.height}</span> on ${benchGpu.split('(')[0]?.trim()}`
          );
          break;

        case 'progress': {
          const info = METHOD_INFO[data.method] || { name: data.method };
          completedMethods = data.index - 1;
          setStatus(
            `Rendering <span class="highlight">${data.index}/${data.total}</span> — ` +
            `<span class="highlight">${info.name}</span> ` +
            `(${fmtMs(data.elapsed_ms)} elapsed)`
          );

          // Add placeholder card for the method being rendered
          if (currentPlaceholder) currentPlaceholder.remove();
          currentPlaceholder = createPlaceholderCard(data.method);
          resultsGrid.appendChild(currentPlaceholder);

          // Scroll the placeholder into view
          currentPlaceholder.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          break;
        }

        case 'result': {
          // Remove placeholder for this method
          if (currentPlaceholder) {
            currentPlaceholder.remove();
            currentPlaceholder = null;
          }

          // Also remove any existing card with same ID (shouldn't happen, but safety)
          const existing = document.getElementById(`card-${data.method}`);
          if (existing) existing.remove();

          // Create and append the completed result card
          const card = createResultCard(data);
          resultsGrid.appendChild(card);
          allResults.push(data);

          completedMethods++;
          const info = METHOD_INFO[data.method] || { name: data.method };
          const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
          setStatus(
            `Completed <span class="highlight">${completedMethods}/${totalMethods}</span> — ` +
            `${info.name}: <span class="highlight">${fmtMs(data.kernel_ms)}</span> kernel ` +
            `(${elapsed}s elapsed)`
          );

          // Scroll the new card into view
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          break;
        }

        case 'complete': {
          if (currentPlaceholder) {
            currentPlaceholder.remove();
            currentPlaceholder = null;
          }

          const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
          const okCount = allResults.filter(r => r.status === 'ok').length;

          setStatus(
            `Benchmark complete — <span class="highlight">${okCount}/${allResults.length}</span> integrators rendered in ` +
            `<span class="highlight">${elapsed}s</span> (server: ${fmtMs(data.total_bench_time_ms)}) — ` +
            `<span class="highlight">${benchResolution.width}×${benchResolution.height}</span>`
          );

          // Render summary cards
          renderSummary(data.summary, data.total_bench_time_ms, benchGpu);

          // Apply fastest/slowest badges and bar widths
          applyFinalStyling(allResults, data.summary);

          // Scroll to top to show summary
          summaryPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
          break;
        }

        default:
          console.log('Unknown SSE event:', event, data);
      }
    }

  } catch (err) {
    if (currentPlaceholder) {
      currentPlaceholder.remove();
      currentPlaceholder = null;
    }
    if (err.name === 'AbortError') {
      setStatus('Benchmark cancelled.');
    } else {
      setStatus(`<span style="color:#d48080;">Error: ${err.message}</span>`);
    }
  } finally {
    abortController = null;
    btnRun.textContent = 'Run Benchmark';
    btnRun.classList.remove('running');
  }
}

btnRun.addEventListener('click', runBenchmark);

// Allow Enter key in inputs to trigger benchmark
document.querySelectorAll('.ctrl-input').forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') runBenchmark();
  });
});
</script>
