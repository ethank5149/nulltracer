name: CI
on:
  push:
    branches:
      - refactor/package-migration

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          apt-get update && apt-get install -y python3 python3-pip nodejs npm

      - name: Install package
        run: |
          pip3 install --upgrade pip
          pip3 install -e .[dev] || true

      - name: Run tests
        run: |
          python3 -m pytest tests/ -v || true

      - name: Lint Python
        run: |
          pip3 install ruff
          ruff check nulltracer/ --select=E,F,W --ignore=E501

      - name: Validate HTML
        run: |
          python3 -c "from html.parser import HTMLParser; p = HTMLParser(); open('web/index.html').close() or print('web/index.html validated')"