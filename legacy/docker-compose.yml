# Nulltracer Renderer — GPU-accelerated server for CUDA rendering
#
# Unraid deployment:
#   This compose file runs ONLY the renderer. Your existing Caddy container
#   handles reverse-proxying and static file serving. See the Caddyfile for
#   the snippet to add to your existing Caddy configuration.
#
# Usage:
#   cd nulltracer
#   docker compose up -d
#
# The renderer will be available at http://<host>:8420 on your Docker network.
# Your existing Caddy container should proxy /render and /health to this service.

services:
  renderer:
    build: ./server
    container_name: nulltracer-renderer
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # CUDA kernel compilation cache (persists across container restarts)
      - CUPY_CACHE_DIR=/tmp/cupy_cache
    volumes:
      - cupy_cache:/tmp/cupy_cache
    ports:
      - "8420:8420"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "net.unraid.docker.managed=composeman"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/selfhosters/unraid-templates/master/templates/img/default.png"

volumes:
  cupy_cache:
