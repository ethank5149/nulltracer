<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerr Black Hole — Geodesic Ray Tracer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'IBM Plex Mono', monospace;
    color: #c8bfa9;
    cursor: crosshair;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  .title-block {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 20;
    pointer-events: none;
  }

  .title-block h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 28px;
    letter-spacing: 0.08em;
    color: #e8dfd0;
    text-shadow: 0 0 40px rgba(255,180,100,0.15);
    margin-bottom: 4px;
  }

  .title-block .subtitle {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #7a7060;
  }

  .controls {
    position: fixed;
    bottom: 28px;
    left: 32px;
    z-index: 20;
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: rgba(10, 8, 6, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(200, 180, 140, 0.08);
    border-radius: 12px;
    padding: 20px 24px;
    min-width: 280px;
  }

  .control-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8a7e6c;
  }

  .control-value {
    font-size: 13px;
    font-weight: 500;
    color: #d4c8b0;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
    text-transform: none;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: rgba(200, 180, 140, 0.12);
    border-radius: 1px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #c8b890;
    border: 2px solid rgba(10, 8, 6, 0.6);
    box-shadow: 0 0 12px rgba(200, 170, 100, 0.25);
    cursor: grab;
    transition: box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 20px rgba(200, 170, 100, 0.45);
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #c8b890;
    border: 2px solid rgba(10, 8, 6, 0.6);
    box-shadow: 0 0 12px rgba(200, 170, 100, 0.25);
    cursor: grab;
  }

  .toggle-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .toggle-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #6a6050;
    background: rgba(200, 180, 140, 0.04);
    border: 1px solid rgba(200, 180, 140, 0.1);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .toggle-btn.active {
    color: #d4c8b0;
    background: rgba(200, 180, 140, 0.1);
    border-color: rgba(200, 180, 140, 0.25);
  }

  .toggle-btn:hover { border-color: rgba(200, 180, 140, 0.2); }

  .readout {
    position: fixed;
    bottom: 28px;
    right: 32px;
    z-index: 20;
    pointer-events: none;
    text-align: right;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #5a5040;
    line-height: 1.8;
  }

  .readout .hl { color: #8a7e6c; }

  .loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #0a0806;
    transition: opacity 1.2s ease;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 18px;
    color: #6a6050;
    letter-spacing: 0.15em;
    animation: pulse 2s ease-in-out infinite;
  }

  .error-text {
    font-size: 11px;
    color: #a04030;
    letter-spacing: 0.05em;
    max-width: 520px;
    text-align: center;
    line-height: 1.6;
    display: none;
    white-space: pre-wrap;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-text" id="loading-msg">Compiling geodesic integrator…</div>
  <div class="error-text" id="error-msg"></div>
</div>

<canvas id="canvas"></canvas>

<div class="title-block">
  <h1>Kerr Spacetime</h1>
  <div class="subtitle">Null geodesic ray tracer — GPU accelerated</div>
</div>

<div class="controls" id="controls">
  <div class="control-row">
    <div class="control-label">
      <span>Black Hole Spin</span>
      <span class="control-value" id="spin-val">a = 0.600</span>
    </div>
    <input type="range" id="spin" min="0" max="0.998" step="0.002" value="0.6">
  </div>
  <div class="control-row">
    <div class="control-label">
      <span>Observer Inclination</span>
      <span class="control-value" id="incl-val">&theta; = 80.0&deg;</span>
    </div>
    <input type="range" id="incl" min="5" max="89" step="0.5" value="80">
  </div>
  <div class="control-row">
    <div class="control-label">
      <span>Disk Temperature</span>
      <span class="control-value" id="temp-val">1.00</span>
    </div>
    <input type="range" id="temp" min="0.2" max="2.5" step="0.05" value="1.0">
  </div>
  <div class="control-row">
    <div class="control-label"><span>Layers</span></div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="btn-disk">Accretion Disk</button>
      <button class="toggle-btn active" id="btn-grid">Celestial Grid</button>
      <button class="toggle-btn" id="btn-rotate">Auto Rotate</button>
    </div>
  </div>
</div>

<div class="readout">
  <span class="hl">r<sub>+</sub></span> = <span id="rp">1.800</span> M<br>
  <span class="hl">r<sub>isco</sub></span> = <span id="risco">4.233</span> M<br>
  <span class="hl">res</span> <span id="res">---</span><br>
  <span class="hl">fps</span> <span id="fps">--</span>
</div>

<script id="vs" type="x-shader/x-vertex">
attribute vec2 a_pos;
varying vec2 v_uv;
void main(){ v_uv=a_pos; gl_Position=vec4(a_pos,0,1); }
</script>

<!--
  FRAGMENT SHADER
  ===============
  Uses the SEPARATED first-order geodesic equations in Kerr spacetime
  (Boyer-Lindquist coords). This avoids computing any metric derivatives.

  Conserved: E=1 (energy), b=Lz/E (angular momentum), q2=Q/E^2 (Carter const)

  Potentials:
    R(r)      = (r²+a²-a·b)² − Δ·[q2 + (b−a)²]
    Θ(θ)      = q2 + a²cos²θ − b²cos²θ/sin²θ

  Equations (Σ = r²+a²cos²θ, Δ = r²−2r+a²):
    Σ·dr/dλ   = ±√R
    Σ·dθ/dλ   = ±√Θ
    Σ·dφ/dλ   = b/sin²θ − a + a(r²+a²−ab)/Δ
-->
<script id="fs" type="x-shader/x-fragment">
precision highp float;

varying vec2 v_uv;
uniform vec2 u_res;
uniform float u_a;      // spin
uniform float u_incl;   // inclination (rad)
uniform float u_fov;
uniform float u_disk;   // show disk
uniform float u_grid;   // show grid
uniform float u_temp;   // disk temp mult
uniform float u_phi0;   // azimuthal rotation

#define PI  3.14159265359
#define TAU 6.28318530718
#define STEPS 220
#define R0  40.0
#define RESC 50.0
#define RDISK 14.0

float hash(vec2 p){
    p=fract(p*vec2(443.8,441.4));
    p+=dot(p,p+19.19);
    return fract(p.x*p.y);
}

float isco(float a){
    float z1=1.+pow(1.-a*a,1./3.)*(pow(1.+a,1./3.)+pow(max(1.-a,0.),1./3.));
    float z2=sqrt(3.*a*a+z1*z1);
    return 3.+z2-sqrt((3.-z1)*(3.+z1+2.*z2));
}

vec3 stars(float th, float ph){
    vec3 c=vec3(.007,.008,.018);
    // milky way
    float mw=exp(-8.*pow(th-PI*.5,2.));
    c+=vec3(.018,.014,.028)*mw;
    // nebulae
    c+=vec3(.018,.006,.022)*hash(floor(vec2(th,ph)*5.))*mw*.5;
    c+=vec3(.004,.012,.022)*hash(floor(vec2(th+40.,ph+60.)*3.))*.25;
    // stars
    for(int L=0;L<3;L++){
        float sc=50.+float(L)*70.;
        vec2 ce=floor(vec2(th,ph)*sc);
        float h=hash(ce+float(L)*137.);
        if(h>.93){
            vec2 sp=(ce+.3+.4*vec2(hash(ce+.5),hash(ce+1.5)))/sc;
            float d=length(vec2(th,ph)-sp)*sc;
            float s=exp(-d*d*5.);
            float t=hash(ce+77.);
            vec3 sc2=t<.2?vec3(1,.7,.4):t<.55?vec3(1,.95,.8):t<.8?vec3(.8,.9,1):vec3(.6,.75,1);
            c+=sc2*s*(.4+2.*hash(ce+33.));
        }
    }
    // grid
    if(u_grid>.5){
        float gt=abs(fract(th/PI*12.)-.5)*2.;
        float gp=abs(fract(ph/TAU*24.)-.5)*2.;
        c+=vec3(.055,.04,.028)*smoothstep(.97,.995,max(gt,gp));
        c+=vec3(.07,.035,.02)*(1.-smoothstep(0.,.012,abs(th-PI*.5)));
    }
    return c;
}

vec3 disk(float r, float ph, float a){
    float ri=isco(a);
    if(r<ri*.88||r>RDISK) return vec3(0);
    float x=r/ri;
    float tp=pow(x,-.75)*u_temp;
    float I=pow(tp,4.)/(r*.35);
    I*=smoothstep(ri*.88,ri*1.3,r);
    I*=smoothstep(RDISK,RDISK*.6,r);
    // doppler
    float vo=1./sqrt(r);
    float dop=1.+.6*vo*sin(ph);
    float boost=pow(max(dop,.1),3.);
    I*=boost;
    float t=clamp(tp*boost*.42,0.,3.);
    vec3 col=t<.5?mix(vec3(.22,.04,0),vec3(.75,.14,.01),t*2.):
              t<1.?mix(vec3(.75,.14,.01),vec3(1,.52,.08),(t-.5)*2.):
              t<1.8?mix(vec3(1,.52,.08),vec3(1,.9,.55),(t-1.)/.8):
              mix(vec3(1,.9,.55),vec3(1,1,1),clamp((t-1.8)/1.2,0.,1.));
    float tu=.7+.3*hash(vec2(r*6.,ph*4.));
    return col*I*tu*2.8;
}

void main(){
    vec2 uv=v_uv;
    float asp=u_res.x/u_res.y;
    float alpha=uv.x*u_fov*asp;
    float beta=uv.y*u_fov;

    float a=u_a, a2=a*a;
    float thObs=u_incl;
    float sO=sin(thObs), cO=cos(thObs);

    // conserved quantities (Bardeen 1973)
    float b=-alpha*sO;
    float q2=beta*beta+cO*cO*(alpha*alpha-a2);

    // initial state
    float r=R0, th=thObs, phi=u_phi0;
    float sr=-1.;  // dr sign (ingoing)
    float st=beta>=0.?-1.:1.;  // dth sign

    float rp=1.+sqrt(max(1.-a2,0.));
    float bma=b-a; float bma2=bma*bma;

    vec3 color=vec3(0);
    bool done=false;
    float h=.25;

    for(int i=0;i<STEPS;i++){
        if(done) break;

        float sth=sin(th), cth=cos(th);
        float s2=sth*sth, c2=cth*cth;
        float sig=r*r+a2*c2;
        float isig=1./sig;
        float del=r*r-2.*r+a2;

        // R potential
        float T=r*r+a2-a*b;
        float Rpot=T*T-del*(q2+bma2);

        // Theta potential
        float Thpot=q2+a2*c2-c2*b*b/max(s2,1e-8);

        // turning-point reflections
        if(Rpot<0.){ Rpot=0.; sr=-sr; }
        if(Thpot<0.){ Thpot=0.; st=-st; }

        float dr=sr*sqrt(Rpot)*isig;
        float dth=st*sqrt(Thpot)*isig;
        float dphi=(b/max(s2,1e-8)-a+a*T/del)*isig;

        // adaptive step
        float he=h*clamp((r-rp)*.35,.04,1.);
        he=clamp(he,.015,.7);

        float oldTh=th, oldR=r, oldPhi=phi;

        // Verlet-style: half-step position, recompute velocities, full step
        // (better than Euler, cheaper than RK4)
        float rH=r+.5*he*dr;
        float thH=th+.5*he*dth;
        float sthH=sin(thH), cthH=cos(thH);
        float s2H=sthH*sthH, c2H=cthH*cthH;
        float sigH=rH*rH+a2*c2H;
        float isigH=1./sigH;
        float delH=rH*rH-2.*rH+a2;
        float TH=rH*rH+a2-a*b;
        float RpH=TH*TH-delH*(q2+bma2);
        float ThpH=q2+a2*c2H-c2H*b*b/max(s2H,1e-8);
        if(RpH<0.){RpH=0.;sr=-sr;}
        if(ThpH<0.){ThpH=0.;st=-st;}
        float drH=sr*sqrt(RpH)*isigH;
        float dthH=st*sqrt(ThpH)*isigH;
        float dphiH=(b/max(s2H,1e-8)-a+a*TH/delH)*isigH;

        r+=he*drH;
        th+=he*dthH;
        phi+=he*dphiH;

        // boundary reflect theta
        if(th<1e-4){th=1e-4;st=1.;}
        if(th>PI-1e-4){th=PI-1e-4;st=-1.;}

        // horizon check
        if(r<=rp*1.005){
            color+=vec3(0);
            done=true; break;
        }

        // disk crossing
        if(u_disk>.5){
            float cross=(oldTh-PI*.5)*(th-PI*.5);
            if(cross<0.){
                float f=abs(oldTh-PI*.5)/max(abs(th-oldTh),1e-6);
                f=clamp(f,0.,1.);
                float dr2=oldR+f*(r-oldR);
                float dp=oldPhi+f*(phi-oldPhi);
                vec3 dc=disk(dr2,dp,a);
                color+=dc*(1.-clamp(length(color)*.4,0.,.9));
            }
        }

        // escape
        if(r>RESC){
            vec3 sky=stars(th,mod(phi,TAU));
            color+=sky*(1.-clamp(length(color)*.3,0.,.9));
            done=true; break;
        }

        if(r!=r||th!=th){done=true;break;}
    }

    // photon ring glow
    float imp=length(vec2(alpha,beta));
    float rc=5.2-1.*a;
    color+=vec3(.08,.06,.04)*exp(-pow((imp-rc)/.3,2.))*.04;

    // vignette
    color*=1.-.3*dot(uv,uv);
    // tonemap + gamma
    color=color/(1.+color);
    color=pow(color,vec3(1./2.2));

    gl_FragColor=vec4(color,1);
}
</script>

<script>
(function(){
    const canvas=document.getElementById('canvas');
    const loadEl=document.getElementById('loading');
    const loadMsg=document.getElementById('loading-msg');
    const errMsg=document.getElementById('error-msg');

    const gl=canvas.getContext('webgl',{antialias:false,preserveDrawingBuffer:false,powerPreference:'high-performance'});
    if(!gl){
        loadMsg.textContent='WebGL not available';
        errMsg.style.display='block';
        errMsg.textContent='Try Chrome or Firefox on a desktop.';
        return;
    }

    let spin=.6,incl=80,diskTemp=1,showDisk=1,showGrid=1,autoRotate=false,rotAngle=0,fov=8;
    let pr=Math.min(window.devicePixelRatio||1,1.25);
    let fc=0,lastFT=performance.now(),curFPS=0;

    function compile(src,type){
        const s=gl.createShader(type);
        gl.shaderSource(s,src);
        gl.compileShader(s);
        if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
            return{s:null,e:gl.getShaderInfoLog(s)};
        }
        return{s,e:null};
    }

    loadMsg.textContent='Compiling shaders…';
    const vr=compile(document.getElementById('vs').textContent,gl.VERTEX_SHADER);
    if(!vr.s){loadMsg.textContent='Vertex shader error';errMsg.style.display='block';errMsg.textContent=vr.e;return;}

    const fr=compile(document.getElementById('fs').textContent,gl.FRAGMENT_SHADER);
    if(!fr.s){loadMsg.textContent='Fragment shader error';errMsg.style.display='block';errMsg.textContent='GPU could not compile ray-tracer.\n\n'+fr.e;return;}

    const prog=gl.createProgram();
    gl.attachShader(prog,vr.s);
    gl.attachShader(prog,fr.s);
    gl.linkProgram(prog);
    if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){
        loadMsg.textContent='Link error';errMsg.style.display='block';errMsg.textContent=gl.getProgramInfoLog(prog);return;
    }
    gl.useProgram(prog);

    const buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
    const aP=gl.getAttribLocation(prog,'a_pos');
    gl.enableVertexAttribArray(aP);
    gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

    const u={};
    ['u_res','u_a','u_incl','u_fov','u_disk','u_grid','u_temp','u_phi0'].forEach(n=>{u[n]=gl.getUniformLocation(prog,n);});

    function resize(){
        const w=Math.floor(innerWidth*pr),h=Math.floor(innerHeight*pr);
        canvas.width=w;canvas.height=h;
        gl.viewport(0,0,w,h);
        document.getElementById('res').textContent=w+'×'+h;
    }
    addEventListener('resize',resize);resize();

    function rPlus(a){return 1+Math.sqrt(Math.max(1-a*a,0));}
    function iscoJS(a){
        const z1=1+Math.pow(1-a*a,1/3)*(Math.pow(1+a,1/3)+Math.pow(Math.max(1-a,0),1/3));
        const z2=Math.sqrt(3*a*a+z1*z1);
        return 3+z2-Math.sqrt((3-z1)*(3+z1+2*z2));
    }
    function updInfo(){
        document.getElementById('rp').textContent=rPlus(spin).toFixed(3);
        document.getElementById('risco').textContent=iscoJS(spin).toFixed(3);
    }

    document.getElementById('spin').addEventListener('input',function(){
        spin=+this.value;
        document.getElementById('spin-val').textContent='a = '+spin.toFixed(3);
        updInfo();
    });
    document.getElementById('incl').addEventListener('input',function(){
        incl=+this.value;
        document.getElementById('incl-val').innerHTML='&theta; = '+incl.toFixed(1)+'&deg;';
    });
    document.getElementById('temp').addEventListener('input',function(){
        diskTemp=+this.value;
        document.getElementById('temp-val').textContent=diskTemp.toFixed(2);
    });

    document.getElementById('btn-disk').addEventListener('click',function(){
        showDisk=showDisk>.5?0:1;this.classList.toggle('active',showDisk>.5);
    });
    document.getElementById('btn-grid').addEventListener('click',function(){
        showGrid=showGrid>.5?0:1;this.classList.toggle('active',showGrid>.5);
    });
    document.getElementById('btn-rotate').addEventListener('click',function(){
        autoRotate=!autoRotate;this.classList.toggle('active',autoRotate);
    });

    canvas.addEventListener('wheel',function(e){
        e.preventDefault();
        fov*=(1+e.deltaY*.001);
        fov=Math.max(2,Math.min(25,fov));
    },{passive:false});

    let ltd=0;
    canvas.addEventListener('touchstart',function(e){
        if(e.touches.length===2){
            const dx=e.touches[0].clientX-e.touches[1].clientX;
            const dy=e.touches[0].clientY-e.touches[1].clientY;
            ltd=Math.sqrt(dx*dx+dy*dy);
        }
    });
    canvas.addEventListener('touchmove',function(e){
        if(e.touches.length===2){
            e.preventDefault();
            const dx=e.touches[0].clientX-e.touches[1].clientX;
            const dy=e.touches[0].clientY-e.touches[1].clientY;
            const d=Math.sqrt(dx*dx+dy*dy);
            if(ltd>0){fov*=ltd/d;fov=Math.max(2,Math.min(25,fov));}
            ltd=d;
        }
    },{passive:false});

    updInfo();
    loadMsg.textContent='Tracing first frame…';

    function render(){
        if(autoRotate) rotAngle+=.008;

        gl.uniform2f(u.u_res,canvas.width,canvas.height);
        gl.uniform1f(u.u_a,spin);
        gl.uniform1f(u.u_incl,incl*Math.PI/180);
        gl.uniform1f(u.u_fov,fov);
        gl.uniform1f(u.u_disk,showDisk);
        gl.uniform1f(u.u_grid,showGrid);
        gl.uniform1f(u.u_temp,diskTemp);
        gl.uniform1f(u.u_phi0,rotAngle);

        gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

        fc++;
        const now=performance.now();
        if(now-lastFT>800){
            curFPS=Math.round(fc/((now-lastFT)*.001));
            document.getElementById('fps').textContent=curFPS;
            fc=0;lastFT=now;
        }
        requestAnimationFrame(render);
    }

    requestAnimationFrame(()=>{
        render();
        setTimeout(()=>loadEl.classList.add('hidden'),500);
    });
})();
</script>
</body>
</html>
