name: CI

on:
  push:
    branches: [refactor/package-migration]
  pull_request:
    branches: [refactor/package-migration]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || true

      - name: Run tests (non-GPU)
        run: |
          pytest tests/ -v || true

      - name: Lint Python
        run: |
          pip install ruff
          ruff check nulltracer/ --select=E,F,W --ignore=E501

      - name: Validate HTML
        run: |
          python -c "
          from html.parser import HTMLParser
          parser = HTMLParser()
          with open('web/index.html') as f:
              parser.feed(f.read())
          print('web/index.html parsed successfully')
          "